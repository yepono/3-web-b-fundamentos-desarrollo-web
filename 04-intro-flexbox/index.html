<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./style.css">
    <title>Flexbox</title>
</head>

<body>
    <h1>Intro a Flexbox</h1>

    <div class="container">
        <div class="box">1</div>
        <div class="box">2</div>
        <div class="box">3</div>
        <div class="box">4</div>
    </div>

    <h1>Ejercicio Practico Flexbox</h1>

    <header>
        <div class="logo">Flashcard</div>
        <div class="botones" Study mode>
            <button>Study mode</button>
            <button>All cards</button>
        </div>
    </header>

    <main>
        <div class="main-content">
            <div class="card-header">
                <div>
                    <button>All categories></button>
                    <input type="checkbox" id="Mastered">
                    <label for="Mastered">Hide Mastered</label>
                </div>
                <div>
                    <button>Shuffle</button>
                </div>
            </div>
            <div class="main-slide">
                <button>Web Development</button>
                <div>
                    <h1>What does HTML stands for?</h1>
                    <p>Lorem ipsum dolor sit amet.</p>
                </div>
                <p>progress ............</p>
            </div>

        </div>
        <div class="statistics">
            <h2>Study statistics</h2>
            <div class="statistics-grid">
                <div class="card-classification">Total cards 40</div>
                <div class="card-classification">Mastered 11</div>
                <div class="card-classification">In Progress 21</div>
                <div class="card-classification">Not Started</div>
            </div>

        </div>
    </main>
</body>

</html>
