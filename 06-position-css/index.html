<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Position CSS</title>
    <link rel="stylesheet" href="./style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bungee&family=Frijole&display=swap" rel="stylesheet">
</head>

<body>

    <!-- Header -->
    <header>
        <nav class="navbar">
            <a href="#home">Inicio</a>

            <a href="#services">Servicios</a>

            <a href="#about">Nosotros</a>

            <a href="#contact">Contacto</a>
        </nav>
    </header>

    <!-- Escena de juego -->
    <div class="game-container">
        <img class="bg-game"
            src="https://c4.wallpaperflare.com/wallpaper/198/583/580/angry-birds-video-games-wallpaper-preview.jpg"
            alt="" />
        <div class="equis">✖️</div>
        <h1 class="game-title">ANGRY BIRDS</h1>
        <div class="bird bird-1"></div>
        <div class="bird bird-2"></div>
        <button class="btn-play">PLAY</button>
        <div class="btn-config-game">
            <button class="btn-settings">⚙️</button>
            <button class="btn-world">👾</button>
            <button class="btn-menu">🚀</button>
        </div>
    </div>

    <!-- Footer -->

    <footer class="cookie-footer">
        <p>
            Este sitio utiliza cookies para mejorar la experiencia.
            <a href="#cookies-policy">Más información</a>.
        </p>

        <button class="cookie-accept">Aceptar</button>
    </footer>




</body>

</html>
